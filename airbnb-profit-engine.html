<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Airbnb Profit Intelligence Engine</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0d1b2a;--cream:#f7f3ee;--terra:#c1440e;--sage:#4a7c59;
  --gold:#c9a84c;--mist:#e8e2d9;--slate:#5a6472;--white:#fff;
}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh}
input,select,button{font-family:'DM Sans',sans-serif;font-size:14px}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeIn .4s ease forwards}
nav{background:var(--ink);height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 32px}
.nav-brand{font-family:'DM Serif Display',serif;font-size:20px;color:#fff}
.nav-tag{background:var(--terra);color:#fff;border-radius:4px;padding:3px 10px;font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase}
main{max-width:1100px;margin:0 auto;padding:36px 24px}
.card{background:#fff;border:1px solid var(--mist);border-radius:16px;padding:24px;box-shadow:0 8px 28px rgba(13,27,42,.08)}
.card-dark{background:var(--ink);border:1px solid #1e2e3d;border-radius:16px;padding:22px}
label.lbl{display:block;font-size:11px;font-weight:600;color:var(--slate);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
input[type=number],select{width:100%;padding:10px 13px;border-radius:9px;border:1.5px solid var(--mist);color:var(--ink);background:#fff;outline:none}
input[type=number]:focus,select:focus{border-color:var(--terra)}
.btn{background:var(--terra);color:#fff;border:none;border-radius:10px;padding:12px 28px;font-size:14px;font-weight:700;cursor:pointer;width:100%}
.btn:hover{opacity:.88}
.btn-sec{background:transparent;color:var(--ink);border:1.5px solid var(--mist);border-radius:9px;padding:9px 20px;font-size:13px;font-weight:600;cursor:pointer}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.g2f{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.chip{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.c-green{background:#dcfce7;color:#166534;border:1px solid #86efac}
.c-yellow{background:#fef9c3;color:#713f12;border:1px solid #fde047}
.c-red{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5}
.c-slate{background:#f1f5f9;color:#475569;border:1px solid #cbd5e1}
.metric{background:#fff;border:1px solid var(--mist);border-radius:14px;padding:18px 20px;box-shadow:0 4px 14px rgba(13,27,42,.06)}
.metric.dark{background:var(--ink);border-color:#1e2e3d}
.lbl2{font-size:11px;font-weight:600;color:var(--slate);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.dark .lbl2{color:#94a3b8}
.mval{font-size:24px;font-weight:700;line-height:1.1}
.msub{font-size:12px;color:var(--slate);margin-top:3px}
.dark .msub{color:#64748b}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 0;color:var(--slate);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;border-bottom:2px solid var(--mist)}
td{padding:9px 0;border-top:1px solid #f8fafc}
.tr{text-align:right}.ti{padding-left:20px}.tb{font-weight:700}.tborder{border-top:2px solid var(--ink)!important;background:#f8fafc}
.bar-wrap{display:flex;flex-direction:column;gap:8px}
.bar-row{display:flex;align-items:center;gap:8px}
.bar-lbl{width:90px;font-size:11px;color:var(--slate);flex-shrink:0;line-height:1.3}
.bar-track{flex:1;background:#f1f5f9;border-radius:4px;height:22px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding:0 8px;font-size:11px;font-weight:700;color:#fff;min-width:2px;transition:width .6s}
.bar-end{font-size:11px;color:var(--slate);width:64px;text-align:right;flex-shrink:0}
.sec-t{font-family:'DM Serif Display',serif;font-size:18px;color:var(--ink);margin-bottom:4px}
.sec-s{font-size:12px;color:var(--slate);margin-bottom:18px}
@media(max-width:720px){.g2,.g2f,.g4{grid-template-columns:1fr}.g3{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<div id="app" style="display:none">
  <nav>
    <div style="display:flex;align-items:center;gap:14px">
      <span class="nav-brand">Airbnb Profit Intelligence</span>
      <span class="nav-tag">Investment Engine</span>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <button id="new-btn" class="btn-sec" style="display:none" onclick="goInputs()">&#8592; New Analysis</button>
      <span style="font-size:11px;color:#94a3b8;background:rgba(255,255,255,.08);padding:3px 10px;border-radius:20px">&#10003; Free &middot; No API Key</span>
    </div>
  </nav>
  <main>
    <div id="inp-panel"></div>
    <div id="res-panel" style="display:none"></div>
  </main>
</div>

<script>
// ── City / benchmark data ─────────────────────────────────────────────────────
var CITIES = {
  Geneva: {
    nbs: ['Eaux-Vives','Plainpalais','Champel','Paquis','Carouge','Servette'],
    bench: {'Eaux-Vives':{a:185,o:.72},'Plainpalais':{a:160,o:.68},'Champel':{a:200,o:.65},'Paquis':{a:145,o:.75},'Carouge':{a:155,o:.70},'Servette':{a:140,o:.66}},
    mc:3.6, mo:1.8, ry:4.2, cur:'CHF'
  },
  Lausanne: {
    nbs: ['Ouchy','Flon','Montriond','Blecherette','Chailly','Prelaz'],
    bench: {'Ouchy':{a:170,o:.71},'Flon':{a:155,o:.69},'Montriond':{a:160,o:.67},'Blecherette':{a:130,o:.62},'Chailly':{a:145,o:.65},'Prelaz':{a:125,o:.63}},
    mc:3.5, mo:1.9, ry:4.1, cur:'CHF'
  },
  Paris: {
    nbs: ['Le Marais','Montmartre','Saint-Germain','Bastille','Oberkampf','Republique'],
    bench: {'Le Marais':{a:210,o:.78},'Montmartre':{a:175,o:.74},'Saint-Germain':{a:240,o:.76},'Bastille':{a:165,o:.72},'Oberkampf':{a:150,o:.70},'Republique':{a:155,o:.71}},
    mc:3.1, mo:3.5, ry:4.8, cur:'EUR'
  },
  Barcelona: {
    nbs: ['Gothic Quarter','Eixample','Gracia','Barceloneta','Poblenou','Sant Pere'],
    bench: {'Gothic Quarter':{a:155,o:.80},'Eixample':{a:145,o:.76},'Gracia':{a:130,o:.72},'Barceloneta':{a:165,o:.82},'Poblenou':{a:120,o:.68},'Sant Pere':{a:140,o:.74}},
    mc:4.0, mo:3.8, ry:5.0, cur:'EUR'
  }
};

// ── Helpers ───────────────────────────────────────────────────────────────────
function sy(cur){ return cur==='EUR'?'€':'CHF '; }
function f0(n){ return Math.round(n).toLocaleString(); }
function p1(n){ return n.toFixed(1)+'%'; }
function ps(n){ return (n>=0?'+':'')+n.toFixed(1)+'%'; }
function c2(n,cur){ return sy(cur)+Math.abs(n).toFixed(2); }

// ── Financial engine ──────────────────────────────────────────────────────────
function calc(inp, om) {
  om = om||1;
  var cd = CITIES[inp.city];
  var b  = cd.bench[inp.nb] || Object.values(cd.bench)[0];
  var s  = sy(cd.cur);
  var adr    = inp.adr>0 ? inp.adr : b.a;
  var occ    = Math.min(.95, Math.max(.1, b.o * om));
  var nights = Math.round(occ * 365);
  var gr  = nights * adr;
  var fee = gr * .03;
  var na  = gr - fee;
  var vc  = nights * inp.varCost;
  var fc  = inp.fixed * 12;
  var noi = na - vc - fc - inp.maint;
  var int = inp.loan * (inp.rate / 100);
  var taxI= Math.max(0, noi - int);
  var tax = taxI * (inp.taxRate / 100);
  var ncf = noi - int - tax;
  var coc = inp.equity > 0 ? (ncf / inp.equity) * 100 : 0;
  var cr  = inp.price  > 0 ? (noi / inp.price)  * 100 : 0;
  var pn  = adr * .97 - inp.varCost;
  var ft  = fc + inp.maint + int;
  var beo = pn > 0 ? Math.min(100, (ft / (pn * 365)) * 100) : 100;
  return {
    gr:gr, fee:fee, na:na, vc:vc, fc:fc, maint:inp.maint,
    noi:noi, int:int, taxI:taxI, tax:tax, ncf:ncf,
    coc:coc, cr:cr, beo:beo, npan:ncf/365,
    occ:occ, nights:nights, adr:adr,
    bA:b.a, bO:b.o, bRP:b.a*b.o, pRP:adr*occ,
    adrD:((adr-b.a)/b.a)*100, occD:(occ-b.o)*100,
    mc:cd.mc, ry:cd.ry, mo:cd.mo, cur:cd.cur, s:s
  };
}

// ── Rule-based intelligence engine ───────────────────────────────────────────
function generateVerdict(f, inp) {
  var s = f.s;

  // ── Verdict logic ──
  var verdict;
  var score = 0;
  if (f.coc >= f.ry)        score += 2;
  else if (f.coc >= f.ry * .7) score += 1;
  if (f.cr >= f.mc)         score += 2;
  else if (f.cr >= f.mc * .8)  score += 1;
  if (f.ncf > 0)            score += 2;
  if (f.occ * 100 > f.beo)  score += 1;
  if (f.adrD > 0)           score += 1;

  if (score >= 6)      verdict = 'BUY';
  else if (score >= 3) verdict = 'HOLD';
  else                 verdict = 'PASS';

  // ── Rationale ──
  var cocVsReit = f.coc - f.ry;
  var crVsMkt   = f.cr  - f.mc;
  var rationale;

  if (verdict === 'BUY') {
    rationale = 'This property generates a cash-on-cash return of ' + p1(f.coc)
      + ', outperforming the comparable REIT yield of ' + f.ry + '% by '
      + Math.abs(cocVsReit).toFixed(1) + ' percentage points — a compelling risk-adjusted case for acquisition. '
      + 'With an implicit cap rate of ' + p1(f.cr) + ' versus the market average of ' + f.mc
      + '%, the asset is attractively priced relative to the local investment landscape.';
  } else if (verdict === 'HOLD') {
    rationale = 'The property shows mixed investment signals: cash-on-cash return of ' + p1(f.coc)
      + ' ' + (cocVsReit >= 0 ? 'meets' : 'trails') + ' the REIT benchmark of ' + f.ry
      + '%, while the cap rate of ' + p1(f.cr) + ' sits '
      + (crVsMkt >= 0 ? 'above' : 'below') + ' the market average of ' + f.mc + '%. '
      + 'Acquisition could be justified if occupancy or pricing improvements are achievable within 12 months.';
  } else {
    rationale = 'At current projections this property fails to clear the investment hurdle: cash-on-cash return of '
      + p1(f.coc) + ' lags the ' + f.ry + '% REIT benchmark by '
      + Math.abs(cocVsReit).toFixed(1) + ' points, and net cash flow of '
      + s + f0(f.ncf) + ' does not justify the equity deployment of ' + s + f0(inp.equity) + '. '
      + 'Pass unless significant operational improvements or price renegotiation are possible.';
  }

  // ── Investment brief ──
  var brief = 'This ' + inp.beds + 'BR ' + inp.type.toLowerCase() + ' in ' + inp.nb + ', ' + inp.city
    + ' projects gross revenue of ' + s + f0(f.gr) + ' at ' + p1(f.occ * 100) + ' occupancy'
    + ' (' + f.nights + ' nights at ' + s + f.adr + ' ADR), yielding NOI of ' + s + f0(f.noi)
    + ' and net cash flow of ' + s + f0(f.ncf) + ' after ' + inp.taxRate + '% tax. '
    + 'The implicit cap rate of ' + p1(f.cr) + ' compares to a Capital IQ market cap rate of ' + f.mc
    + '% for ' + inp.city + ', ' + (crVsMkt >= 0 ? 'a positive spread of ' + crVsMkt.toFixed(1) + ' pts — the asset offers value relative to market.' : 'a negative spread of ' + Math.abs(crVsMkt).toFixed(1) + ' pts — the asset appears overpriced relative to market.')
    + ' Under the optimistic scenario (+20% occupancy), cash-on-cash return reaches '
    + p1(calc(inp, 1.2).coc) + '; under the pessimistic scenario it falls to ' + p1(calc(inp, 0.8).coc) + '. '
    + 'Net profit per available night of ' + c2(f.npan, f.cur) + '/night '
    + (f.npan >= 0 ? 'confirms positive operational economics.' : 'signals the property is currently cash-flow negative on a per-night basis.');

  // ── Anomaly detection ──
  var anomalies = [];

  // Occupancy gap
  if (f.occD < -8) {
    anomalies.push({
      title: 'Occupancy Below Neighbourhood Median',
      detail: 'Your projected occupancy of ' + p1(f.occ * 100) + ' lags the ' + inp.nb
        + ' neighbourhood average by ' + Math.abs(f.occD).toFixed(1) + ' percentage points. '
        + 'Closing half this gap would add approximately ' + s + f0((f.bA * Math.abs(f.occD) * .5 / 100) * 365 * .97 - inp.varCost * (Math.abs(f.occD) * .5 / 100) * 365)
        + ' in net annual revenue.',
      severity: f.occD < -15 ? 'HIGH' : 'MEDIUM'
    });
  }

  // Cleaning / variable cost ratio
  var varRatio = f.vc / f.gr * 100;
  if (varRatio > 20) {
    anomalies.push({
      title: 'High Variable Cost Ratio',
      detail: 'Variable costs (cleaning + consumables) represent ' + varRatio.toFixed(1)
        + '% of gross revenue. The typical benchmark is 12–18%. Renegotiating cleaning contracts or batching turnovers could recover '
        + s + f0(f.vc * 0.25) + ' annually.',
      severity: varRatio > 28 ? 'HIGH' : 'MEDIUM'
    });
  }

  // Financing drag
  var intRatio = f.int / f.noi * 100;
  if (f.noi > 0 && intRatio > 60) {
    anomalies.push({
      title: 'Heavy Financing Drag on NOI',
      detail: 'Loan interest of ' + s + f0(f.int) + ' consumes ' + intRatio.toFixed(0)
        + '% of NOI, leaving thin margin for tax and cash flow. Consider a larger equity contribution or refinancing at a lower rate to improve cash-on-cash return.',
      severity: intRatio > 90 ? 'HIGH' : 'MEDIUM'
    });
  }

  // ADR gap
  if (f.adrD < -10) {
    anomalies.push({
      title: 'ADR Below Neighbourhood Average',
      detail: 'Your nightly rate of ' + s + f.adr + ' is ' + Math.abs(f.adrD).toFixed(1)
        + '% below the ' + inp.nb + ' average of ' + s + f.bA
        + '. Improving listing quality, photography, or dynamic pricing could close this gap — a 10% ADR improvement alone adds '
        + s + f0(f.nights * f.adr * 0.1 * 0.97) + ' to net revenue.',
      severity: f.adrD < -20 ? 'HIGH' : 'MEDIUM'
    });
  }

  // Fixed cost ratio
  var fixedRatio = f.fc / f.gr * 100;
  if (fixedRatio > 30) {
    anomalies.push({
      title: 'Elevated Fixed Cost Base',
      detail: 'Annual fixed costs of ' + s + f0(f.fc) + ' represent ' + fixedRatio.toFixed(1)
        + '% of gross revenue. In STR analysis, fixed costs above 25% of revenue compress NOI significantly regardless of occupancy performance.',
      severity: 'MEDIUM'
    });
  }

  // Break-even risk
  if (f.occ * 100 < f.beo + 5) {
    anomalies.push({
      title: 'Thin Margin Above Break-even',
      detail: 'Actual occupancy of ' + p1(f.occ * 100) + ' sits only '
        + (f.occ * 100 - f.beo).toFixed(1) + ' points above break-even occupancy of ' + p1(f.beo)
        + '. Any demand softness or seasonal dip could push the property into negative cash flow territory.',
      severity: f.occ * 100 < f.beo ? 'HIGH' : 'MEDIUM'
    });
  }

  // Cap rate vs market
  if (crVsMkt < -1) {
    anomalies.push({
      title: 'Cap Rate Below Market Average',
      detail: 'Implicit cap rate of ' + p1(f.cr) + ' lags the ' + inp.city + ' market average of '
        + f.mc + '% by ' + Math.abs(crVsMkt).toFixed(1) + ' points. This implies the property is priced for income it is not yet generating. Price renegotiation or NOI improvement is required for market-rate returns.',
      severity: 'MEDIUM'
    });
  }

  // Default if nothing flagged
  if (anomalies.length === 0) {
    anomalies.push({
      title: 'No Major Profitability Leaks Detected',
      detail: 'Your cost structure and revenue assumptions are within normal ranges for ' + inp.nb + '. Focus on maintaining occupancy and reviewing pricing seasonally to preserve current performance.',
      severity: 'LOW'
    });
  }

  // Cap at 3 and ensure severity ordering
  var order = {HIGH:0, MEDIUM:1, LOW:2};
  anomalies.sort(function(a,b){ return order[a.severity] - order[b.severity]; });
  anomalies = anomalies.slice(0, 3);
  while (anomalies.length < 3) {
    anomalies.push({title:'Monitor Operating Costs', detail:'Continue tracking variable costs against neighbourhood benchmarks on a quarterly basis to catch margin compression early.', severity:'LOW'});
  }

  return { verdict:verdict, rationale:rationale, brief:brief, anomalies:anomalies };
}

// ── State ─────────────────────────────────────────────────────────────────────
var INP = {}, FIN = {};

function nbOpts(city) {
  return CITIES[city].nbs.map(function(n){ return '<option>'+n+'</option>'; }).join('');
}
function updateNbs() {
  var city = document.getElementById('sc').value;
  document.getElementById('sn').innerHTML = nbOpts(city);
  updateBench();
}
function updateBench() {
  var city = document.getElementById('sc').value;
  var nb   = document.getElementById('sn').value;
  var cd   = CITIES[city];
  var b    = cd.bench[nb] || Object.values(cd.bench)[0];
  var s    = sy(cd.cur);
  document.getElementById('b-adr').textContent = s + b.a;
  document.getElementById('b-occ').textContent = p1(b.o * 100);
  document.getElementById('b-rp').textContent  = s + (b.a * b.o).toFixed(0);
  document.getElementById('b-mc').textContent  = cd.mc + '%';
  document.getElementById('b-mo').textContent  = cd.mo + '%';
  document.getElementById('b-ry').textContent  = cd.ry + '%';
}
function goInputs() {
  document.getElementById('res-panel').style.display = 'none';
  document.getElementById('inp-panel').style.display = '';
  document.getElementById('new-btn').style.display   = 'none';
}

// ── Render inputs ─────────────────────────────────────────────────────────────
function renderInp() {
  var dc = 'Geneva', cd = CITIES[dc], b = cd.bench[cd.nbs[0]], s = sy(cd.cur);
  document.getElementById('inp-panel').innerHTML = '<div class="fade">'
    + '<div style="margin-bottom:28px">'
    + '<h1 style="font-family:\'DM Serif Display\',serif;font-size:30px;margin-bottom:8px">STR Investment Analyser</h1>'
    + '<p style="font-size:14px;color:var(--slate);max-width:580px">Configure your target property. Revenue is projected from Inside Airbnb market data. The engine builds a full P&amp;L and delivers an investment verdict — no API key required.</p>'
    + '</div>'
    + '<div class="g2" style="align-items:start">'

    // LEFT
    + '<div style="display:flex;flex-direction:column;gap:20px">'
    + '<div class="card"><p class="sec-t">Property</p><p class="sec-s">Location &amp; type</p>'
    + '<div class="g2f">'
    + '<div><label class="lbl">City</label><select id="sc" onchange="updateNbs()">' + Object.keys(CITIES).map(function(c){return'<option>'+c+'</option>';}).join('') + '</select></div>'
    + '<div><label class="lbl">Neighbourhood</label><select id="sn" onchange="updateBench()">' + nbOpts(dc) + '</select></div>'
    + '<div><label class="lbl">Property Type</label><select id="st">' + ['Apartment','House','Studio','Penthouse','Chalet'].map(function(t){return'<option>'+t+'</option>';}).join('') + '</select></div>'
    + '<div><label class="lbl">Bedrooms</label><select id="sb">' + [1,2,3,4,5].map(function(n){return'<option value="'+n+'">'+n+'</option>';}).join('') + '</select></div>'
    + '<div style="grid-column:1/-1"><label class="lbl">ADR Override (' + s + '/night) — 0 = use benchmark (' + b.a + ')</label><input type="number" id="ia" value="0" min="0"/></div>'
    + '</div></div>'
    + '<div class="card"><p class="sec-t">Financing</p><p class="sec-s">Capital structure</p>'
    + '<div class="g2f">'
    + '<div><label class="lbl">Purchase Price (' + s + ')</label><input type="number" id="ip" value="850000"/></div>'
    + '<div><label class="lbl">Equity / Down Payment (' + s + ')</label><input type="number" id="ie" value="212500"/></div>'
    + '<div><label class="lbl">Loan Amount (' + s + ')</label><input type="number" id="il" value="637500"/></div>'
    + '<div><label class="lbl">Interest Rate (%)</label><input type="number" id="ir" value="1.8" step="0.1"/></div>'
    + '<div><label class="lbl">Loan Term (years)</label><input type="number" id="it" value="25"/></div>'
    + '<div><label class="lbl">Tax Rate (%)</label><input type="number" id="ix" value="22"/></div>'
    + '</div></div>'
    + '</div>'

    // RIGHT
    + '<div style="display:flex;flex-direction:column;gap:20px">'
    + '<div class="card"><p class="sec-t">Operating Costs</p><p class="sec-s">Annual &amp; per-night expenses</p>'
    + '<div style="display:flex;flex-direction:column;gap:12px">'
    + '<div><label class="lbl">Fixed Monthly Costs (' + s + '/mo) — HOA, insurance, rates</label><input type="number" id="if" value="800"/></div>'
    + '<div><label class="lbl">Variable Cost per Night (' + s + ') — cleaning, consumables</label><input type="number" id="iv" value="45"/></div>'
    + '<div><label class="lbl">Annual Maintenance (' + s + ')</label><input type="number" id="im" value="4000"/></div>'
    + '</div></div>'
    + '<div class="card-dark">'
    + '<p style="font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.9px;margin-bottom:14px">Inside Airbnb Benchmarks</p>'
    + '<div class="g3">'
    + '<div><p style="font-size:10px;color:#64748b;font-weight:600;text-transform:uppercase;margin-bottom:2px">Avg ADR</p><p style="font-size:20px;font-weight:700;color:#fff" id="b-adr">' + s + b.a + '</p></div>'
    + '<div><p style="font-size:10px;color:#64748b;font-weight:600;text-transform:uppercase;margin-bottom:2px">Occupancy</p><p style="font-size:20px;font-weight:700;color:#fff" id="b-occ">' + p1(b.o*100) + '</p></div>'
    + '<div><p style="font-size:10px;color:#64748b;font-weight:600;text-transform:uppercase;margin-bottom:2px">RevPAR</p><p style="font-size:20px;font-weight:700;color:#fff" id="b-rp">' + s + (b.a*b.o).toFixed(0) + '</p></div>'
    + '</div>'
    + '<div style="border-top:1px solid rgba(255,255,255,.07);margin-top:14px;padding-top:14px">'
    + '<p style="font-size:10px;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px">Capital IQ Context</p>'
    + '<div class="g3">'
    + '<div><p style="font-size:10px;color:#64748b;margin-bottom:2px">Mkt Cap Rate</p><p style="font-size:15px;font-weight:700;color:var(--gold)" id="b-mc">' + cd.mc + '%</p></div>'
    + '<div><p style="font-size:10px;color:#64748b;margin-bottom:2px">Avg Mortgage</p><p style="font-size:15px;font-weight:700;color:var(--gold)" id="b-mo">' + cd.mo + '%</p></div>'
    + '<div><p style="font-size:10px;color:#64748b;margin-bottom:2px">REIT Yield</p><p style="font-size:15px;font-weight:700;color:var(--gold)" id="b-ry">' + cd.ry + '%</p></div>'
    + '</div></div></div>'
    + '<button class="btn" style="padding:15px;font-size:15px" onclick="runAnalysis()">Run Investment Analysis &#8594;</button>'
    + '</div></div></div>';
}

function g(id){ return document.getElementById(id); }
function gv(id,def){ var n=parseFloat(g(id).value); return isNaN(n)?def||0:n; }

function readInp() {
  return {
    city:g('sc').value, nb:g('sn').value, type:g('st').value,
    beds:parseInt(g('sb').value), adr:gv('ia'),
    price:gv('ip'), equity:gv('ie'), loan:gv('il'),
    rate:gv('ir'), term:gv('it'), taxRate:gv('ix'),
    fixed:gv('if'), varCost:gv('iv'), maint:gv('im')
  };
}

function runAnalysis() {
  INP = readInp();
  FIN = calc(INP);
  renderResults();
  document.getElementById('inp-panel').style.display = 'none';
  document.getElementById('res-panel').style.display = '';
  document.getElementById('new-btn').style.display   = '';
}

// ── Bar chart helper ──────────────────────────────────────────────────────────
function barChart(rows, maxV) {
  return rows.map(function(r) {
    var pct = Math.max(0, Math.min(100, Math.abs(r.v) / maxV * 100));
    var col = r.v >= 0 ? '#4ade80' : '#f87171';
    var lbl = (r.v < 0 ? '&#8722;' : '') + FIN.s + f0(Math.abs(r.v));
    return '<div class="bar-row"><span class="bar-lbl">' + r.l + '</span>'
      + '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;background:' + col + '">' + lbl + '</div></div></div>';
  }).join('');
}

// ── Render results ────────────────────────────────────────────────────────────
function renderResults() {
  var f = FIN, inp = INP;
  var ai = generateVerdict(f, inp);

  var scenarios = [{l:'Pessimistic',m:.80,col:'#f87171'},{l:'Base Case',m:1.0,col:'#60a5fa'},{l:'Optimistic',m:1.2,col:'#4ade80'}]
    .map(function(s){ var r=calc(inp,s.m); r.l=s.l; r.col=s.col; return r; });

  var cocCol = f.coc>=f.ry?'#22c55e':f.coc>=0?'#eab308':'#ef4444';
  var crCol  = f.cr>=f.mc?'#22c55e':'#ef4444';
  var npCol  = f.npan>=0?'#22c55e':'#ef4444';
  var vcChip = ai.verdict==='BUY'?'c-green':ai.verdict==='HOLD'?'c-yellow':'c-red';

  var plRows = [
    {l:'Gross Rev',v:f.gr},{l:'Airbnb Fee',v:-f.fee},{l:'Variable',v:-f.vc},
    {l:'Fixed Costs',v:-f.fc},{l:'Maintenance',v:-f.maint},{l:'NOI',v:f.noi},
    {l:'Interest',v:-f.int},{l:'Tax',v:-f.tax},{l:'Net CF',v:f.ncf}
  ];
  var maxPL = Math.max.apply(null, plRows.map(function(r){return Math.abs(r.v);}));

  var maxSc = Math.max.apply(null, scenarios.map(function(s){return Math.abs(s.coc);}));
  maxSc = Math.max(maxSc, f.ry*2, 1);
  var scenBars = scenarios.map(function(s){
    var pct = Math.max(2, Math.min(100, Math.abs(s.coc)/maxSc*100));
    return '<div class="bar-row"><span class="bar-lbl">'+s.l+'</span>'
      +'<div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:'+s.col+'">'+p1(s.coc)+'</div></div>'
      +'<span class="bar-end">'+f.s+f0(s.ncf)+'</span></div>';
  }).join('');

  var bItems = [
    {l:'ADR',p:f.adr,b:f.bA,fmt:function(v){return f.s+Math.round(v);}},
    {l:'Occ %',p:f.occ*100,b:f.bO*100,fmt:function(v){return p1(v);}},
    {l:'RevPAR',p:f.pRP,b:f.bRP,fmt:function(v){return f.s+Math.round(v);}}
  ];
  var maxB = Math.max.apply(null, bItems.map(function(bi){return Math.max(bi.p,bi.b);}));
  var benchBars = bItems.map(function(bi){
    var pp=Math.max(2,(bi.p/maxB)*100), bp=Math.max(2,(bi.b/maxB)*100);
    return '<div style="margin-bottom:14px">'
      +'<p style="font-size:11px;font-weight:600;color:var(--slate);margin-bottom:5px">'+bi.l+'</p>'
      +'<div class="bar-row" style="margin-bottom:3px"><span style="width:80px;font-size:11px;flex-shrink:0">Your property</span>'
      +'<div class="bar-track"><div class="bar-fill" style="width:'+pp+'%;background:#0d1b2a">'+bi.fmt(bi.p)+'</div></div></div>'
      +'<div class="bar-row"><span style="width:80px;font-size:11px;color:var(--slate);flex-shrink:0">Neighbourhood</span>'
      +'<div class="bar-track"><div class="bar-fill" style="width:'+bp+'%;background:#94a3b8">'+bi.fmt(bi.b)+'</div></div></div>'
      +'</div>';
  }).join('');

  var macroRows = [
    {l:'Cash-on-Cash Return',p:p1(f.coc),b:f.ry+'% REIT yield',beat:f.coc>=f.ry,note:'vs comparable REIT dividend yield'},
    {l:'Implicit Cap Rate',p:p1(f.cr),b:f.mc+'% market avg',beat:f.cr>=f.mc,note:'NOI / purchase price vs market cap rate'},
    {l:'Financing Cost',p:inp.rate+'%',b:f.mo+'% avg mortgage',beat:inp.rate<=f.mo,note:'vs average residential mortgage rate'}
  ];

  var plTable = [
    {l:'Gross Revenue',v:f.gr,pct:100,bold:true},
    {l:'Airbnb Host Fee (3%)',v:-f.fee,pct:(f.fee/f.gr)*100,ind:true},
    {l:'Net Airbnb Revenue',v:f.na,pct:(f.na/f.gr)*100,bold:true},
    {l:'Variable Costs ('+f.s+inp.varCost+'/night x '+f.nights+' nights)',v:-f.vc,pct:(f.vc/f.gr)*100,ind:true},
    {l:'Fixed Costs ('+f.s+inp.fixed+'/mo x 12)',v:-f.fc,pct:(f.fc/f.gr)*100,ind:true},
    {l:'Annual Maintenance',v:-f.maint,pct:(f.maint/f.gr)*100,ind:true},
    {l:'Net Operating Income (NOI)',v:f.noi,pct:(f.noi/f.gr)*100,bold:true,col:f.noi>=0?'var(--sage)':'var(--terra)'},
    {l:'Loan Interest ('+inp.rate+'% x '+f.s+f0(inp.loan)+')',v:-f.int,pct:(f.int/f.gr)*100,ind:true},
    {l:'Taxable Income',v:f.taxI,pct:(f.taxI/f.gr)*100},
    {l:'Income Tax ('+inp.taxRate+'%)',v:-f.tax,pct:(f.tax/f.gr)*100,ind:true},
    {l:'Net Cash Flow After Tax',v:f.ncf,pct:(f.ncf/f.gr)*100,bold:true,border:true,col:f.ncf>=0?'var(--sage)':'var(--terra)'}
  ];

  var sevCols = {
    HIGH:  ['#fff1f2','#fecaca','#991b1b'],
    MEDIUM:['#fffbeb','#fde68a','#92400e'],
    LOW:   ['#f0fdf4','#bbf7d0','#166534']
  };

  document.getElementById('res-panel').innerHTML = '<div class="fade">'

    // Header
    + '<div style="margin-bottom:26px">'
    + '<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:5px">'
    + '<h2 style="font-family:\'DM Serif Display\',serif;font-size:26px">'+inp.beds+'BR '+inp.type+', '+inp.nb+'</h2>'
    + '<span class="chip '+vcChip+'">'+ai.verdict+'</span>'
    + '</div>'
    + '<p style="font-size:13px;color:var(--slate)">'+inp.city+' &middot; '+f.s+f0(inp.price)+' purchase &middot; '+f.s+f0(inp.equity)+' equity deployed</p>'
    + '</div>'

    // KPIs
    + '<div class="g4" style="margin-bottom:18px">'
    + '<div class="metric dark"><p class="lbl2">Cash-on-Cash Return</p><p class="mval" style="font-size:28px;color:'+cocCol+'">'+p1(f.coc)+'</p><p class="msub">REIT benchmark: '+f.ry+'%</p></div>'
    + '<div class="metric"><p class="lbl2">Net Cash Flow / yr</p><p class="mval" style="color:'+(f.ncf>=0?'var(--sage)':'var(--terra)')+'">'+f.s+f0(f.ncf)+'</p><p class="msub">After tax &amp; debt service</p></div>'
    + '<div class="metric"><p class="lbl2">Implicit Cap Rate</p><p class="mval" style="color:'+crCol+'">'+p1(f.cr)+'</p><p class="msub">Market avg: '+f.mc+'%</p></div>'
    + '<div class="metric"><p class="lbl2">NP / Available Night</p><p class="mval" style="color:'+npCol+'">'+c2(f.npan,f.cur)+'</p><p class="msub">Net profit ÷ 365</p></div>'
    + '</div>'
    + '<div class="g2" style="margin-bottom:20px">'
    + '<div class="metric"><p class="lbl2">Break-even Occupancy</p><p class="mval" style="color:'+(f.occ*100>f.beo?'var(--sage)':'var(--terra)')+'">'+p1(f.beo)+'</p><p class="msub">Actual: '+p1(f.occ*100)+' &middot; '+(f.occ*100>f.beo?'&#10003; Above break-even':'&#10007; Below break-even')+'</p></div>'
    + '<div class="metric"><p class="lbl2">Net Operating Income</p><p class="mval">'+f.s+f0(f.noi)+'</p><p class="msub">'+p1((f.noi/f.gr)*100)+' of gross revenue</p></div>'
    + '</div>'

    // Investment verdict
    + '<div class="card-dark" style="margin-bottom:20px;position:relative;overflow:hidden">'
    + '<div style="position:absolute;top:0;right:0;width:160px;height:160px;background:radial-gradient(circle,rgba(201,168,76,.07),transparent 70%);pointer-events:none"></div>'
    + '<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">'
    + '<p style="font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.9px">&#129302; Investment Verdict</p>'
    + '<span class="chip '+vcChip+'">'+ai.verdict+'</span>'
    + '</div>'
    + '<p style="font-size:14px;color:#e2e8f0;line-height:1.75;margin-bottom:14px">'+ai.rationale+'</p>'
    + '<div style="border-top:1px solid rgba(255,255,255,.07);padding-top:12px">'
    + '<p style="font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px">Investment Brief</p>'
    + '<p style="font-size:13px;color:#94a3b8;line-height:1.75">'+ai.brief+'</p>'
    + '</div></div>'

    // Charts
    + '<div class="g2" style="margin-bottom:20px">'
    + '<div class="card"><h3 style="font-size:13px;font-weight:700;color:var(--slate);text-transform:uppercase;letter-spacing:.8px;margin-bottom:16px">P&amp;L Waterfall</h3>'
    + '<div class="bar-wrap">'+barChart(plRows, maxPL)+'</div></div>'
    + '<div class="card"><h3 style="font-size:13px;font-weight:700;color:var(--slate);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px">Scenario Analysis — CoC Return</h3>'
    + '<p style="font-size:11px;color:var(--slate);margin-bottom:14px">&#8722;20% / base / +20% occupancy &middot; REIT hurdle: '+f.ry+'%</p>'
    + '<div class="bar-wrap" style="margin-bottom:16px">'+scenBars+'</div>'
    + '<div class="g3">'+scenarios.map(function(s){
        return '<div style="text-align:center;padding:10px;background:#f8fafc;border-radius:9px">'
          +'<p style="font-size:10px;color:var(--slate);font-weight:600;margin-bottom:3px">'+s.l+'</p>'
          +'<p style="font-size:16px;font-weight:700;color:'+(s.coc>=f.ry?'var(--sage)':s.coc>=0?'#ca8a04':'var(--terra)')+'">'+p1(s.coc)+'</p>'
          +'<p style="font-size:10px;color:#94a3b8">'+f.s+f0(s.ncf)+'</p></div>';
      }).join('')+'</div></div></div>'

    // Benchmarking
    + '<div class="g2" style="margin-bottom:20px">'
    + '<div class="card"><h3 style="font-size:13px;font-weight:700;color:var(--slate);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px">Local Benchmarking</h3>'
    + '<p style="font-size:12px;color:var(--slate);margin-bottom:16px">Your property vs '+inp.nb+' average (Inside Airbnb)</p>'
    + benchBars
    + '<div class="g2f" style="margin-top:12px;gap:8px">'
    + '<div style="padding:10px;border-radius:8px;background:'+(f.adrD>=0?'#dcfce7':'#fee2e2')+'">'
    + '<p style="font-size:10px;font-weight:600;color:'+(f.adrD>=0?'#166534':'#991b1b')+'">ADR vs Benchmark</p>'
    + '<p style="font-size:17px;font-weight:700;color:'+(f.adrD>=0?'#16a34a':'#dc2626')+'">'+ps(f.adrD)+'</p></div>'
    + '<div style="padding:10px;border-radius:8px;background:'+(f.occD>=0?'#dcfce7':'#fee2e2')+'">'
    + '<p style="font-size:10px;font-weight:600;color:'+(f.occD>=0?'#166534':'#991b1b')+'">Occ vs Benchmark</p>'
    + '<p style="font-size:17px;font-weight:700;color:'+(f.occD>=0?'#16a34a':'#dc2626')+'">'+ps(f.occD)+'</p></div>'
    + '</div></div>'
    + '<div class="card"><h3 style="font-size:13px;font-weight:700;color:var(--slate);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px">Macro Investment Context</h3>'
    + '<p style="font-size:12px;color:var(--slate);margin-bottom:16px">Capital IQ benchmarks &middot; '+inp.city+'</p>'
    + macroRows.map(function(r){
        return '<div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--mist)">'
          +'<div><p style="font-size:13px;font-weight:600;margin-bottom:2px">'+r.l+'</p><p style="font-size:11px;color:var(--slate)">'+r.note+'</p></div>'
          +'<div style="text-align:right"><p style="font-size:17px;font-weight:700;color:'+(r.beat?'var(--sage)':'var(--terra)')+';margin-bottom:3px">'+r.p+'</p>'
          +'<span class="chip '+(r.beat?'c-green':'c-red')+'">'+(r.beat?'&#9650; Beats':'&#9660; Lags')+' '+r.b+'</span></div></div>';
      }).join('')+'</div></div>'

    // Profitability leaks
    + '<div class="card" style="margin-bottom:20px">'
    + '<h3 style="font-size:13px;font-weight:700;color:var(--slate);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px">&#128269; Profitability Leak Detection</h3>'
    + '<p style="font-size:12px;color:var(--slate);margin-bottom:16px">Automatically identified from your inputs vs neighbourhood benchmarks</p>'
    + '<div class="g3">'+ai.anomalies.map(function(a){
        var c = sevCols[a.severity]||sevCols.LOW;
        return '<div style="padding:14px;border-radius:10px;background:'+c[0]+';border:1px solid '+c[1]+'">'
          +'<p style="font-size:11px;font-weight:800;color:'+c[2]+';text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">'+a.severity+'</p>'
          +'<p style="font-size:13px;font-weight:700;color:var(--ink);margin-bottom:4px">'+a.title+'</p>'
          +'<p style="font-size:12px;color:var(--slate);line-height:1.5">'+a.detail+'</p></div>';
      }).join('')+'</div></div>'

    // P&L table
    + '<div class="card" style="margin-bottom:20px">'
    + '<h3 style="font-size:13px;font-weight:700;color:var(--slate);text-transform:uppercase;letter-spacing:.8px;margin-bottom:16px">Full P&amp;L Statement</h3>'
    + '<table><thead><tr><th>Line Item</th><th class="tr">Annual ('+f.cur+')</th><th class="tr">% Revenue</th></tr></thead><tbody>'
    + plTable.map(function(r){
        var vs = (r.v<0?'&#8722;':'')+f.s+f0(Math.abs(r.v));
        return '<tr class="'+(r.border?'tborder':'')+'">'
          +'<td class="'+(r.ind?'ti ':'')+''+(r.bold?'tb':'')+'" style="'+(r.col?'color:'+r.col:'')+'">'+(r.l)+'</td>'
          +'<td class="tr '+(r.bold?'tb':'')+'" style="color:'+(r.v<0?'var(--terra)':'var(--ink)')+'">'+vs+'</td>'
          +'<td class="tr" style="font-size:12px;color:var(--slate)">'+r.pct.toFixed(1)+'%</td></tr>';
      }).join('')
    + '</tbody></table>'
    + '<div class="g4" style="margin-top:16px;padding-top:16px;border-top:1px solid var(--mist)">'
    + [['Nights Booked',f.nights+' / 365'],['Effective ADR',f.s+f.adr],['Occupancy',p1(f.occ*100)],['RevPAR',f.s+f.pRP.toFixed(0)]]
        .map(function(x){return '<div><p style="font-size:10px;color:var(--slate);font-weight:600;text-transform:uppercase;letter-spacing:.7px;margin-bottom:2px">'+x[0]+'</p><p style="font-size:16px;font-weight:700">'+x[1]+'</p></div>';}).join('')
    + '</div></div>'

    // Note
    + '<div style="padding:12px 16px;background:#fffbeb;border:1px solid #fde68a;border-radius:10px">'
    + '<p style="font-size:11px;font-weight:700;color:#92400e;text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px">&#9888; Methodology Note</p>'
    + '<p style="font-size:12px;color:#78350f;line-height:1.5">Revenue projections use Inside Airbnb neighbourhood averages as occupancy benchmarks. Capital IQ figures are reference values. Investment verdict and profitability analysis are generated by a rule-based engine — cross-check against live data and actual host revenue before making investment decisions.</p>'
    + '</div></div>';
}

// ── Boot ──────────────────────────────────────────────────────────────────────
document.getElementById('app').style.display = 'block';
renderInp();
</script>
</body>
</html>
